<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Dar Al Muneerah building placeholder">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3f2"/>
      <stop offset="1" stop-color="#e9f3ef"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d99277"/>
      <stop offset="1" stop-color="#c67a5f"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fae4f"/>
      <stop offset="1" stop-color="#3f7a3a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="820" fill="url(#sky)"/>

  <!-- ground -->
  <rect y="640" width="1280" height="180" fill="#cdb79a"/>
  <rect y="700" width="1280" height="120" fill="#b98f6f" opacity="0.55"/>

  <!-- building facade -->
  <rect x="300" y="250" width="680" height="420" fill="url(#brick)"/>
  <rect x="300" y="250" width="680" height="420" fill="none" stroke="#a5624a" stroke-width="4"/>
  <!-- brick lines -->
  <g stroke="#b76f56" stroke-width="1.5" opacity="0.5">
    <line x1="300" y1="300" x2="980" y2="300"/>
    <line x1="300" y1="350" x2="980" y2="350"/>
    <line x1="300" y1="400" x2="980" y2="400"/>
    <line x1="300" y1="450" x2="980" y2="450"/>
    <line x1="300" y1="500" x2="980" y2="500"/>
    <line x1="300" y1="550" x2="980" y2="550"/>
    <line x1="300" y1="600" x2="980" y2="600"/>
  </g>
  <!-- decorative tile band (teal) -->
  <rect x="300" y="256" width="680" height="20" fill="#2f8fa6" opacity="0.85"/>
  <g fill="#e9f3ef" opacity="0.7">
    <circle cx="330" cy="266" r="3"/><circle cx="360" cy="266" r="3"/><circle cx="390" cy="266" r="3"/>
    <circle cx="420" cy="266" r="3"/><circle cx="450" cy="266" r="3"/><circle cx="480" cy="266" r="3"/>
    <circle cx="510" cy="266" r="3"/><circle cx="540" cy="266" r="3"/><circle cx="570" cy="266" r="3"/>
    <circle cx="600" cy="266" r="3"/><circle cx="630" cy="266" r="3"/><circle cx="660" cy="266" r="3"/>
    <circle cx="690" cy="266" r="3"/><circle cx="720" cy="266" r="3"/><circle cx="750" cy="266" r="3"/>
    <circle cx="780" cy="266" r="3"/><circle cx="810" cy="266" r="3"/><circle cx="840" cy="266" r="3"/>
    <circle cx="870" cy="266" r="3"/><circle cx="900" cy="266" r="3"/><circle cx="930" cy="266" r="3"/>
    <circle cx="960" cy="266" r="3"/>
  </g>

  <!-- windows -->
  <g>
    <rect x="360" y="430" width="150" height="120" fill="#31373a" stroke="#a5624a" stroke-width="6"/>
    <rect x="770" y="430" width="150" height="120" fill="#31373a" stroke="#a5624a" stroke-width="6"/>
    <g stroke="#5b6468" stroke-width="2">
      <line x1="435" y1="430" x2="435" y2="550"/>
      <line x1="360" y1="490" x2="510" y2="490"/>
      <line x1="845" y1="430" x2="845" y2="550"/>
      <line x1="770" y1="490" x2="920" y2="490"/>
    </g>
  </g>

  <!-- entrance canopy + door -->
  <rect x="565" y="470" width="150" height="200" fill="#7a4636"/>
  <rect x="560" y="450" width="160" height="26" fill="#e6ddc9"/>
  <rect x="583" y="490" width="114" height="180" fill="#8a5a3a"/>
  <line x1="640" y1="490" x2="640" y2="670" stroke="#5f3c26" stroke-width="3"/>
  <!-- steps -->
  <rect x="540" y="640" width="200" height="14" fill="#efe9de"/>
  <rect x="520" y="654" width="240" height="14" fill="#e4dccd"/>
  <rect x="500" y="668" width="280" height="16" fill="#d8cfbc"/>

  <!-- trees -->
  <g>
    <ellipse cx="180" cy="430" rx="180" ry="210" fill="url(#leaf)" opacity="0.92"/>
    <ellipse cx="1120" cy="410" rx="190" ry="230" fill="url(#leaf)" opacity="0.92"/>
    <ellipse cx="150" cy="300" rx="120" ry="140" fill="#5c9a45" opacity="0.85"/>
    <ellipse cx="1150" cy="270" rx="130" ry="150" fill="#5c9a45" opacity="0.85"/>
  </g>
</svg>
