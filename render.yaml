# One-click deploy blueprint for Render (https://render.com).
# It provisions BOTH a free PostgreSQL database and the web app, and wires the
# database URL into the app automatically. See DEPLOY.md for the click steps.

databases:
  - name: dar-muneerah-db
    plan: free
    databaseName: darmuneerah
    user: darmuneerah

services:
  - type: web
    name: dar-muneerah
    runtime: node
    plan: free
    # Build the app against PostgreSQL.
    buildCommand: npm install && node scripts/use-postgres.mjs && npx prisma generate && npx next build
    # Create the tables and the admin account before the app goes live.
    preDeployCommand: npx prisma db push --skip-generate && npx tsx prisma/seed.ts
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dar-muneerah-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret automatically
      - key: ADMIN_EMAIL
        value: admin@darmuneerah.edu.pk
      - key: ADMIN_PASSWORD
        sync: false # you set this in the Render dashboard
      - key: ADMIN_NAME
        value: Administrator
      - key: NODE_VERSION
        value: "20"
